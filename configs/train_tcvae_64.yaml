# β-TCVAE sweep at 64px (plan.md Stage 4 stretch). Same grid/architecture as the
# β-VAE headline (configs/train_sweep.yaml) so the comparison is apples-to-apples;
# only the loss changes — β now weights the *total-correlation* term of the KL
# decomposition (Chen et al. 2018), the term most directly tied to disentanglement.
# 60 epochs (vs 30) since we're testing whether more capacity for disentanglement
# plus longer training moves MIG where plain β-VAE could not.
loss: tcvae
img_size: 64
latent_dim: 16
channels: 32
lr: 0.001
batch_size: 128
epochs: 60
cache: true
num_workers: 0

betas: [1, 2, 4, 8]
seeds: [0, 1, 2]
